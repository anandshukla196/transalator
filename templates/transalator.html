<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Translator - Anand Shukla</title>

<style>

/* ===== FULL BACKGROUND IMAGE ===== */
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    color:rgb(4, 0, 255);

    background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url("/static/transalor.png");
background-image: url("/static/anand.jpg");

    background-size:cover;
    background-position:center;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* ===== HEADER ===== */
.header{
    margin-top:20px;
    font-size:32px;
    font-weight:bold;
    letter-spacing:3px;
    text-shadow:0 0 15px cyan;
}

/* ===== SCROLL TEXT ===== */
marquee{
    width:90%;
    max-width:900px;
    margin-top:10px;
    background:rgba(255,255,255,0.15);
    padding:10px;
    border-radius:10px;
    backdrop-filter:blur(10px);
}

/* ===== GLASS CARD ===== */
.card{
    margin-top:30px;
    width:90%;
    max-width:600px;
    padding:30px;
    border-radius:20px;
    background:rgba(197, 17, 17, 0.12);
    backdrop-filter:blur(20px);
    box-shadow:0 0 30px rgba(0,0,0,0.5);
}

/* ===== INPUT ===== */
textarea, select{
    width:100%;
    padding:12px;
    margin-top:8px;
    border-radius:10px;
    border:none;
    font-size:15px;
}

/* ===== BUTTON ===== */
button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:16px;
    color:white;
    cursor:pointer;
    background:linear-gradient(45deg,#00f2fe,#4facfe);
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #00f2fe;
}

/* ===== RESULT ===== */
.result{
    margin-top:20px;
    padding:20px;
    border-radius:15px;
    background:rgba(255,255,255,0.15);
}

audio{
    width:100%;
    margin-top:10px;
}

.download{
    display:inline-block;
    margin-top:10px;
    padding:8px 15px;
    background:white;
    color:black;
    border-radius:8px;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="header">AI TRANSLATOR</div>

<marquee>
Business is not about ideas — it’s about making ideas happen.
Success comes from solving problems. Think big, start small, move fast.
</marquee>

<div class="card">

<form method="post">

<label>Enter Text</label>
<textarea name="text" rows="4" placeholder="Type here..."></textarea>

<label>Select Language</label>
<select name="lang">
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
</select>

<label>Select Voice</label>
<select name="voice">
<option value="male">👨 Male</option>
<option value="female">👩 Female</option>
</select>

<button type="submit">Translate & Generate Audio</button>

</form>

{% if translated %}
<div class="result">
<h3>Translated Text</h3>
<p>{{ translated }}</p>

{% if audio_file %}
<audio controls>
<source src="{{ url_for('static', filename='audio/' ~ audio_file) }}">
</audio>

<a class="download" href="{{ url_for('static', filename='audio/' ~ audio_file) }}">
Download Audio
</a>
{% endif %}
</div>
{% endif %}

</div>

</body>
</html>
